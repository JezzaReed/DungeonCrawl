name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Export Windows Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Stamp build number into source and export preset
        run: |
          BUILD=${{ github.run_number }}
          # In-game build label (Scripts/Core/BuildInfo.cs)
          sed -i "s/public const string Number = \"dev\";/public const string Number = \"$BUILD\";/" Scripts/Core/BuildInfo.cs
          # Windows .exe file metadata (export_presets.cfg)
          sed -i "s|application/file_version=\"\"|application/file_version=\"1.0.0.$BUILD\"|" export_presets.cfg
          sed -i "s|application/product_version=\"\"|application/product_version=\"1.0.0.$BUILD\"|" export_presets.cfg
          echo "Stamped build #$BUILD"
          grep -E "Number =|file_version|product_version" Scripts/Core/BuildInfo.cs export_presets.cfg

      - name: Build C# solution
        run: dotnet build "New Game Project.sln"

      - name: Create export output directory
        run: mkdir -p build/windows

      - name: Export with Godot
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_linux_x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_export_templates.tpz"
          relative_project_path: ./
          export_debug: false
          cache: true
          use_preset_export_path: true

      - name: Zip the Windows build
        run: |
          cd build/windows
          zip -r ../../DungeonCrawl-windows.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonCrawl-windows-${{ github.run_number }}
          path: DungeonCrawl-windows.zip
          retention-days: 90

      - name: Publish to rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Build #${{ github.run_number }}"
          body: |
            Automated Windows build #${{ github.run_number }} from the latest push to `main`.
            Commit: ${{ github.sha }}
          prerelease: true
          files: DungeonCrawl-windows.zip
