<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- skull -->
  <rect x="5" y="1" width="6" height="5" fill="#ccccaa"/>
  <rect x="4" y="2" width="8" height="3" fill="#ccccaa"/>
  <!-- skull highlight -->
  <rect x="5" y="1" width="6" height="1" fill="#ddddbb"/>
  <!-- eye sockets -->
  <rect x="5" y="3" width="2" height="2" fill="#0a0806"/>
  <rect x="9" y="3" width="2" height="2" fill="#0a0806"/>
  <!-- nose cavity -->
  <rect x="7" y="5" width="2" height="1" fill="#0a0806"/>
  <!-- jaw -->
  <rect x="5" y="6" width="6" height="2" fill="#bbbbaa"/>
  <rect x="5" y="7" width="1" height="1" fill="#0a0806"/>
  <rect x="7" y="7" width="2" height="1" fill="#0a0806"/>
  <rect x="10" y="7" width="1" height="1" fill="#0a0806"/>
  <!-- neck -->
  <rect x="7" y="8" width="2" height="1" fill="#aaaaaa"/>
  <!-- ribcage -->
  <rect x="5" y="9" width="6" height="4" fill="#aaaaaa"/>
  <!-- rib lines -->
  <rect x="4" y="9"  width="1" height="1" fill="#aaaaaa"/>
  <rect x="11" y="9"  width="1" height="1" fill="#aaaaaa"/>
  <rect x="4" y="11" width="1" height="1" fill="#aaaaaa"/>
  <rect x="11" y="11" width="1" height="1" fill="#aaaaaa"/>
  <!-- spine vertical -->
  <rect x="7" y="9" width="2" height="4" fill="#0a0806"/>
  <!-- rib gaps -->
  <rect x="5" y="10" width="2" height="1" fill="#0a0806"/>
  <rect x="9" y="10" width="2" height="1" fill="#0a0806"/>
  <rect x="5" y="12" width="2" height="1" fill="#0a0806"/>
  <rect x="9" y="12" width="2" height="1" fill="#0a0806"/>
  <!-- arm bones -->
  <rect x="3" y="9"  width="1" height="4" fill="#aaaaaa"/>
  <rect x="12" y="9" width="1" height="4" fill="#aaaaaa"/>
  <!-- leg bones -->
  <rect x="5" y="13" width="2" height="3" fill="#aaaaaa"/>
  <rect x="9" y="13" width="2" height="3" fill="#aaaaaa"/>
  <!-- foot bones -->
  <rect x="4" y="15" width="3" height="1" fill="#999999"/>
  <rect x="9" y="15" width="3" height="1" fill="#999999"/>
</svg>
