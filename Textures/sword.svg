<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- blade — diagonal top-right to bottom-left -->
  <rect x="11" y="1"  width="3" height="1" fill="#ddddee"/>
  <rect x="10" y="2"  width="2" height="1" fill="#ddddee"/>
  <rect x="9"  y="2"  width="1" height="1" fill="#aaaacc"/>
  <rect x="9"  y="3"  width="2" height="1" fill="#ddddee"/>
  <rect x="8"  y="3"  width="1" height="1" fill="#aaaacc"/>
  <rect x="8"  y="4"  width="2" height="1" fill="#ddddee"/>
  <rect x="7"  y="4"  width="1" height="1" fill="#aaaacc"/>
  <rect x="7"  y="5"  width="2" height="1" fill="#ccccee"/>
  <rect x="6"  y="5"  width="1" height="1" fill="#aaaacc"/>
  <rect x="6"  y="6"  width="2" height="1" fill="#ccccee"/>
  <rect x="5"  y="6"  width="1" height="1" fill="#aaaacc"/>
  <rect x="5"  y="7"  width="2" height="1" fill="#ccccee"/>
  <rect x="4"  y="7"  width="1" height="1" fill="#aaaacc"/>
  <!-- blade tip highlight -->
  <rect x="12" y="1"  width="2" height="1" fill="#eeeeff"/>
  <!-- crossguard -->
  <rect x="2"  y="8"  width="8" height="2" fill="#aa8833"/>
  <rect x="3"  y="7"  width="1" height="4" fill="#aa8833"/>
  <rect x="2"  y="8"  width="8" height="1" fill="#ccaa44"/>
  <!-- grip -->
  <rect x="3"  y="10" width="1" height="4" fill="#774422"/>
  <rect x="3"  y="10" width="1" height="1" fill="#995533"/>
  <rect x="3"  y="12" width="1" height="1" fill="#995533"/>
  <!-- pommel -->
  <rect x="2"  y="14" width="3" height="2" fill="#aa8833"/>
  <rect x="2"  y="14" width="3" height="1" fill="#ccaa44"/>
</svg>
