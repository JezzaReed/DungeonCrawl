<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- cork -->
  <rect x="6" y="1" width="4" height="1" fill="#886644"/>
  <rect x="6" y="2" width="4" height="2" fill="#aa8855"/>
  <!-- neck -->
  <rect x="7" y="4" width="2" height="3" fill="#cc6666"/>
  <!-- neck glass highlight -->
  <rect x="7" y="4" width="1" height="3" fill="#dd8888"/>
  <!-- shoulder -->
  <rect x="5" y="7" width="6" height="1" fill="#cc3333"/>
  <rect x="4" y="8" width="8" height="1" fill="#cc3333"/>
  <!-- body -->
  <rect x="3" y="9"  width="10" height="5" fill="#dd2222"/>
  <!-- liquid fill dark bottom -->
  <rect x="3" y="13" width="10" height="1" fill="#aa1111"/>
  <!-- glass highlight left -->
  <rect x="3" y="9"  width="2" height="4" fill="#ee4444"/>
  <rect x="3" y="9"  width="1" height="2" fill="#ff6666"/>
  <!-- glass highlight top-right -->
  <rect x="11" y="9"  width="1" height="1" fill="#ee5555"/>
  <!-- bottom round -->
  <rect x="4" y="14" width="8" height="1" fill="#cc2222"/>
  <rect x="5" y="15" width="6" height="1" fill="#aa1111"/>
</svg>
