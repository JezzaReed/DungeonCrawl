<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- head — wide -->
  <rect x="3" y="2" width="10" height="6" fill="#885522"/>
  <rect x="4" y="1" width="8" height="2"  fill="#885522"/>
  <!-- brow ridge dark -->
  <rect x="3" y="2" width="10" height="1" fill="#663311"/>
  <!-- eyes — red glowing -->
  <rect x="5" y="3" width="2" height="2" fill="#cc2200"/>
  <rect x="9" y="3" width="2" height="2" fill="#cc2200"/>
  <rect x="6" y="3" width="1" height="1" fill="#ff4422"/>
  <rect x="10" y="3" width="1" height="1" fill="#ff4422"/>
  <!-- nose flat -->
  <rect x="7" y="5" width="2" height="2" fill="#663311"/>
  <!-- lower jaw / mouth -->
  <rect x="4" y="7" width="8" height="1" fill="#663311"/>
  <!-- tusks -->
  <rect x="5" y="7" width="2" height="2" fill="#ddccaa"/>
  <rect x="9" y="7" width="2" height="2" fill="#ddccaa"/>
  <!-- body — stocky -->
  <rect x="3" y="8" width="10" height="5" fill="#774411"/>
  <!-- hide texture lines -->
  <rect x="5" y="9"  width="6" height="1" fill="#663311"/>
  <rect x="4" y="11" width="8" height="1" fill="#663311"/>
  <!-- arms — wide -->
  <rect x="1" y="8"  width="2" height="4" fill="#885522"/>
  <rect x="13" y="8" width="2" height="4" fill="#885522"/>
  <!-- fists -->
  <rect x="1" y="12"  width="2" height="1" fill="#663311"/>
  <rect x="13" y="12" width="2" height="1" fill="#663311"/>
  <!-- weapon (club) in right hand -->
  <rect x="14" y="5"  width="1" height="7" fill="#554433"/>
  <rect x="14" y="4"  width="2" height="2" fill="#664422"/>
  <!-- legs -->
  <rect x="4" y="13" width="3" height="3" fill="#774411"/>
  <rect x="9" y="13" width="3" height="3" fill="#774411"/>
  <!-- feet -->
  <rect x="3" y="15"  width="4" height="1" fill="#553300"/>
  <rect x="9" y="15"  width="4" height="1" fill="#553300"/>
</svg>
