<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- top roll shadow -->
  <rect x="3" y="1"  width="10" height="1" fill="#aa9944"/>
  <!-- top roll -->
  <rect x="2" y="2"  width="12" height="2" fill="#ccbb55"/>
  <rect x="3" y="2"  width="10" height="1" fill="#ddcc66"/>
  <!-- cord tie -->
  <rect x="7" y="2"  width="2"  height="2" fill="#885522"/>
  <!-- parchment face -->
  <rect x="3" y="4"  width="10" height="8" fill="#eeee66"/>
  <rect x="2" y="5"  width="12" height="6" fill="#eeee66"/>
  <!-- parchment shading edges -->
  <rect x="2" y="5"  width="1"  height="6" fill="#cccc44"/>
  <rect x="13" y="5" width="1"  height="6" fill="#cccc44"/>
  <!-- lightning bolt on face -->
  <rect x="9"  y="5"  width="2" height="1" fill="#0a0806"/>
  <rect x="8"  y="6"  width="2" height="1" fill="#0a0806"/>
  <rect x="7"  y="7"  width="4" height="1" fill="#0a0806"/>
  <rect x="8"  y="8"  width="2" height="1" fill="#0a0806"/>
  <rect x="7"  y="9"  width="2" height="1" fill="#0a0806"/>
  <!-- bottom roll -->
  <rect x="2" y="11" width="12" height="2" fill="#ccbb55"/>
  <rect x="3" y="11" width="10" height="1" fill="#ddcc66"/>
  <!-- bottom roll shadow -->
  <rect x="3" y="13" width="10" height="1" fill="#aa9944"/>
</svg>
