<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#1c1a18"/>
  <!-- step 1 — widest, nearest -->
  <rect x="1" y="2"  width="14" height="2" fill="#c8a020"/>
  <rect x="1" y="4"  width="14" height="1" fill="#7a6010"/>
  <!-- step 2 -->
  <rect x="3" y="6"  width="10" height="2" fill="#b89018"/>
  <rect x="3" y="8"  width="10" height="1" fill="#6a5010"/>
  <!-- step 3 -->
  <rect x="5" y="10" width="6"  height="2" fill="#a07a14"/>
  <rect x="5" y="12" width="6"  height="1" fill="#5a4010"/>
  <!-- step 4 — narrowest, deepest -->
  <rect x="7" y="13" width="2"  height="1" fill="#805808"/>
  <!-- void -->
  <rect x="7" y="14" width="2"  height="2" fill="#0a0806"/>
</svg>
