<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- helmet crest -->
  <rect x="6" y="1" width="4" height="1" fill="#f0e040"/>
  <!-- helmet -->
  <rect x="5" y="2" width="6" height="1" fill="#aaaacc"/>
  <rect x="4" y="3" width="8" height="2" fill="#888899"/>
  <!-- visor -->
  <rect x="5" y="3" width="6" height="2" fill="#222233"/>
  <!-- visor slit highlight -->
  <rect x="5" y="3" width="6" height="1" fill="#2a2a44"/>
  <!-- helmet cheeks -->
  <rect x="4" y="5" width="1" height="1" fill="#888899"/>
  <rect x="11" y="5" width="1" height="1" fill="#888899"/>
  <!-- pauldrons / shoulders -->
  <rect x="3" y="5" width="10" height="1" fill="#aaaacc"/>
  <rect x="2" y="6" width="12" height="1" fill="#9999bb"/>
  <!-- chest plate -->
  <rect x="4" y="6" width="8" height="5" fill="#777788"/>
  <!-- chest detail line -->
  <rect x="7" y="7" width="2" height="3" fill="#888899"/>
  <rect x="5" y="8" width="6" height="1" fill="#888899"/>
  <!-- arms -->
  <rect x="2" y="7" width="2" height="3" fill="#666677"/>
  <rect x="12" y="7" width="2" height="3" fill="#666677"/>
  <!-- gauntlets -->
  <rect x="2" y="10" width="2" height="1" fill="#888899"/>
  <rect x="12" y="10" width="2" height="1" fill="#888899"/>
  <!-- belt -->
  <rect x="4" y="11" width="8" height="1" fill="#554433"/>
  <!-- legs -->
  <rect x="5" y="12" width="2" height="3" fill="#666677"/>
  <rect x="9" y="12" width="2" height="3" fill="#666677"/>
  <!-- boots -->
  <rect x="4" y="14" width="3" height="2" fill="#443322"/>
  <rect x="9" y="14" width="3" height="2" fill="#443322"/>
</svg>
