<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- wings left -->
  <rect x="0" y="3"  width="4" height="2" fill="#881010"/>
  <rect x="0" y="5"  width="5" height="2" fill="#aa1818"/>
  <rect x="1" y="7"  width="4" height="2" fill="#881010"/>
  <rect x="2" y="9"  width="3" height="2" fill="#661010"/>
  <!-- wings right -->
  <rect x="12" y="3"  width="4" height="2" fill="#881010"/>
  <rect x="11" y="5"  width="5" height="2" fill="#aa1818"/>
  <rect x="11" y="7"  width="4" height="2" fill="#881010"/>
  <rect x="11" y="9"  width="3" height="2" fill="#661010"/>
  <!-- body -->
  <rect x="4" y="4"  width="8" height="8" fill="#dd2020"/>
  <rect x="5" y="3"  width="6" height="2" fill="#dd2020"/>
  <rect x="5" y="11" width="6" height="2" fill="#cc1818"/>
  <!-- scale highlights -->
  <rect x="5" y="5"  width="2" height="1" fill="#ff4444"/>
  <rect x="9" y="5"  width="2" height="1" fill="#ff4444"/>
  <rect x="6" y="7"  width="4" height="1" fill="#ff4444"/>
  <rect x="5" y="9"  width="2" height="1" fill="#ff4444"/>
  <rect x="9" y="9"  width="2" height="1" fill="#ff4444"/>
  <!-- belly lighter -->
  <rect x="6" y="6"  width="4" height="4" fill="#ee3333"/>
  <!-- head -->
  <rect x="5" y="1"  width="6" height="3" fill="#cc1818"/>
  <!-- horns -->
  <rect x="5" y="0"  width="1" height="2" fill="#881010"/>
  <rect x="10" y="0" width="1" height="2" fill="#881010"/>
  <!-- eyes -->
  <rect x="6" y="2"  width="2" height="1" fill="#ffcc00"/>
  <rect x="9" y="2"  width="2" height="1" fill="#ffcc00"/>
  <rect x="7" y="2"  width="1" height="1" fill="#0a0806"/>
  <rect x="10" y="2" width="1" height="1" fill="#0a0806"/>
  <!-- tail -->
  <rect x="7" y="13" width="2" height="1" fill="#cc1818"/>
  <rect x="7" y="14" width="2" height="1" fill="#aa1414"/>
  <rect x="8" y="15" width="1" height="1" fill="#881010"/>
</svg>
